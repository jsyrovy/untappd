name: Deploy Tap API Worker

on:
  push:
    paths:
      - "workers/tap-api/**"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: workers/tap-api/package-lock.json

      - name: Install dependencies
        working-directory: workers/tap-api
        run: npm ci

      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: workers/tap-api
          wranglerVersion: "4.83.0"
