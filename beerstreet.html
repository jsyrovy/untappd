<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beer Street — Aktuální nabídka</title>
    <link rel="icon" type="image/png" href="web/favicon.png">
    <link rel="apple-touch-icon" href="web/favicon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@400;500;600&display=swap"
          rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        chalk: '#f5f0e8',
                        amber: '#d4a854',
                        'amber-light': '#e8c97a',
                        slate: '#1a1a1a',
                        'slate-light': '#2a2a2a',
                        'slate-mid': '#3a3a3a',
                    },
                    fontFamily: {
                        display: ['"Instrument Serif"', 'Georgia', 'serif'],
                        body: ['"DM Sans"', 'system-ui', 'sans-serif'],
                    },
                },
            },
        }
    </script>
    <style>
        body {
            background-color: #1a1a1a;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
        }

        .beer-card {
            transition: transform 0.25s ease, box-shadow 0.25s ease;
        }

        .beer-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4);
        }

        .price-pulse {
            animation: pulse-glow 2.5s ease-in-out infinite;
        }

        @keyframes pulse-glow {
            0%, 100% {
                text-shadow: 0 0 0 transparent;
            }
            50% {
                text-shadow: 0 0 16px rgba(212, 168, 84, 0.3);
            }
        }

        .fade-in {
            animation: fadeIn 0.4s ease forwards;
            opacity: 0;
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
            }
        }

        .loading-dot {
            animation: loadBounce 1.4s ease-in-out infinite both;
        }

        .loading-dot:nth-child(1) {
            animation-delay: -0.32s;
        }

        .loading-dot:nth-child(2) {
            animation-delay: -0.16s;
        }

        @keyframes loadBounce {
            0%, 80%, 100% {
                transform: scale(0);
            }
            40% {
                transform: scale(1);
            }
        }
    </style>
</head>
<body class="min-h-screen font-body text-chalk">

<!-- Header -->
<header class="pt-12 pb-8 px-6 text-center">
    <h1 class="font-display text-5xl md:text-7xl text-amber tracking-tight">Beer Street</h1>
    <p class="mt-3 text-chalk/50 text-sm uppercase tracking-[0.25em]">Aktuální nabídka na čepu</p>
    <div class="mt-4 flex items-center justify-center gap-2 text-chalk/30 text-xs">
        <span id="update-time"></span>
    </div>
    <div class="mt-6 mx-auto w-24 h-px bg-gradient-to-r from-transparent via-amber/40 to-transparent"></div>
</header>

<!-- Loading -->
<div id="loading" class="flex flex-col items-center justify-center py-32">
    <div class="flex gap-2">
        <div class="loading-dot w-3 h-3 rounded-full bg-amber"></div>
        <div class="loading-dot w-3 h-3 rounded-full bg-amber"></div>
        <div class="loading-dot w-3 h-3 rounded-full bg-amber"></div>
    </div>
    <p class="mt-6 text-chalk/40 text-sm">Načítám nabídku...</p>
</div>

<!-- Error -->
<div id="error" class="hidden px-6 py-32 text-center">
    <p class="text-red-400 text-lg font-display">Nepodařilo se načíst nabídku</p>
    <p class="mt-2 text-chalk/40 text-sm">Zkuste obnovit stránku</p>
    <button onclick="loadBeers()"
            class="mt-6 px-6 py-2 border border-amber/30 text-amber text-sm rounded hover:bg-amber/10 transition-colors">
        Zkusit znovu
    </button>
</div>

<!-- Beer Grid -->
<main id="beer-grid" class="hidden max-w-6xl mx-auto px-6 pb-16">
    <div id="beer-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5"></div>
</main>

<!-- Footer -->
<footer class="pb-12 text-center">
    <div class="mx-auto w-24 h-px bg-gradient-to-r from-transparent via-amber/20 to-transparent mb-6"></div>
    <a href="https://beerstreet.cz" target="_blank" rel="noopener"
       class="text-chalk/30 text-xs hover:text-amber transition-colors">
        beerstreet.cz
    </a>
</footer>

<script>
    function esc(s) {
        const el = document.createElement('span');
        el.textContent = s;
        return el.innerHTML;
    }

    function calculatePullitrPrice(beer) {
        const cena04 = parseFloat(beer.cena04);
        if (!isNaN(cena04) && cena04 > 0) {
            return {price: Math.round(cena04 / 4 * 5), originalPrice: cena04, originalVolume: '0,4 l'};
        }
        const cena03 = parseFloat(beer.cena03);
        if (!isNaN(cena03) && cena03 > 0) {
            return {price: Math.round(cena03 / 3 * 5), originalPrice: cena03, originalVolume: '0,3 l'};
        }
        return null;
    }

    function renderBeers(beers) {
        const container = document.getElementById('beer-container');
        container.innerHTML = '';

        const sorted = [...beers].sort((a, b) => Number(a.poradi) - Number(b.poradi));
        const fragment = document.createDocumentFragment();

        sorted.forEach((beer, i) => {
            const priceData = calculatePullitrPrice(beer);
            const epm = esc(String(beer.epm || '').trim());
            const name = esc(String(beer.nazev || '').trim());
            const brewery = esc(String(beer.nazev_pivovaru || '').trim());
            const style = esc(String(beer.styl || '').trim());
            const abv = esc(String(beer.avb || '').trim());
            const poradi = esc(String(beer.poradi || '').trim());

            const card = document.createElement('div');
            card.className = `beer-card fade-in bg-slate-light border border-slate-mid rounded-xl p-6 flex flex-col`;
            card.style.animationDelay = `${i * 0.07}s`;

            card.innerHTML = `
                    <div class="flex items-start justify-between gap-3 mb-4">
                        <div class="min-w-0">
                            <h2 class="font-display text-2xl text-chalk leading-tight">
                                ${epm ? `<span class="text-amber">${epm}°</span> ` : ''}${name}
                            </h2>
                            ${brewery ? `<p class="mt-1 text-chalk/50 text-sm truncate">${brewery}</p>` : ''}
                        </div>
                        <span class="shrink-0 text-xs font-medium text-chalk/50 bg-chalk/5 border border-chalk/10 rounded-full px-2.5 py-1">
                            #${poradi}
                        </span>
                    </div>

                    <div class="flex flex-wrap gap-2 mb-5">
                        ${style ? `<span class="text-xs bg-amber/10 text-amber-light border border-amber/20 rounded-full px-2.5 py-0.5">${style}</span>` : ''}
                        ${abv ? `<span class="text-xs bg-chalk/5 text-chalk/60 border border-slate-mid rounded-full px-2.5 py-0.5">${abv}% alc.</span>` : ''}
                    </div>

                    <div class="mt-auto pt-4 border-t border-slate-mid">
                        ${priceData ? `
                            <div class="flex items-end justify-between">
                                <div>
                                    <p class="text-chalk/40 text-xs">${priceData.originalVolume} za ${priceData.originalPrice} Kč</p>
                                </div>
                                <div class="text-right">
                                    <p class="text-chalk/40 text-[10px] uppercase tracking-wider mb-0.5">půllitr</p>
                                    <p class="price-pulse font-display text-3xl text-amber">${priceData.price} <span class="text-lg text-amber/70">Kč</span></p>
                                </div>
                            </div>
                        ` : `
                            <p class="text-chalk/30 text-sm italic">Cena neuvedena</p>
                        `}
                    </div>
                `;

            fragment.appendChild(card);
        });

        container.appendChild(fragment);
    }

    const API_URL = 'https://corsproxy.io/?url=' + encodeURIComponent('https://beerstreet.cz/data/beers.json');

    async function fetchBeers() {
        const response = await fetch(API_URL);
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        return response.json();
    }

    async function loadBeers() {
        const loading = document.getElementById('loading');
        const error = document.getElementById('error');
        const grid = document.getElementById('beer-grid');

        loading.classList.remove('hidden');
        error.classList.add('hidden');
        grid.classList.add('hidden');

        try {
            const data = await fetchBeers();

            renderBeers(data.beers || []);

            loading.classList.add('hidden');
            grid.classList.remove('hidden');

            const now = new Date();
            document.getElementById('update-time').textContent =
                `Načteno ${now.toLocaleString('cs-CZ', {
                    day: 'numeric',
                    month: 'numeric',
                    year: 'numeric',
                    hour: '2-digit',
                    minute: '2-digit'
                })}`;
        } catch (e) {
            loading.classList.add('hidden');
            error.classList.remove('hidden');
        }
    }

    loadBeers();
</script>
</body>
</html>
